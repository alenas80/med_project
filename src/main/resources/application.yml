spring:
  application:
    name: med-project

  datasource:
    url: jdbc:postgresql://localhost:5432/medvec
    username: med
    password: med

  servlet:
    multipart:
      max-file-size: 512MB
      max-request-size: 512MB

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:7b
      embedding:
        options:
          model: nomic-embed-text

    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 768
        index-type: hnsw
        distance-type: COSINE_DISTANCE

server:
  port: 8080

app:
  ollama:
    multimodal-embedding-model: ""